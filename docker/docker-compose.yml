services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: trading_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # Override CMD for local dev: enable --reload and live-mount source
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ../app:/app/app
      - ../tools:/app/tools
      - ../resources:/app/resources
      - ../tests:/app/tests
      - ../requirements.txt:/app/requirements.txt
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trading_copilot
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SYNTHESIS_PROVIDER=${SYNTHESIS_PROVIDER:-anthropic}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - INTERNAL_SECRET=${INTERNAL_SECRET:-}
      - FRONTEND_URL=${FRONTEND_URL:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-slim
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
    environment:
      - VITE_API_TARGET=http://api:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api

volumes:
  pg_data:
